<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monka Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header{display:flex;justify-content:space-around;background:#111;padding:10px}
header button{background:none;border:none;color:#d4af37;font-weight:bold}
.section{display:none;padding:10px}
.active{display:block}
.card{background:#1a1a1a;padding:12px;margin:8px 0;border-radius:12px}
input,select{width:100%;margin:5px 0;padding:10px;border-radius:6px;border:none}
button{background:#d4af37;border:none;padding:10px;border-radius:6px}
.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;font-size:28px}
</style>
</head>

<body>

<header>
<button onclick="nav('bodega')">BODEGA</button>
<button onclick="nav('locales')">LOCALES</button>
<button onclick="nav('reportes')">REPORTES</button>
</header>

<div id="bodega" class="section active"></div>
<div id="locales" class="section"></div>
<div id="reportes" class="section"></div>

<button class="fab" onclick="openModal()">+</button>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center">
<div style="background:#111;padding:20px;width:90%;border-radius:10px">
<h3>Producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="color" placeholder="Color">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<select id="local">
<option value="Bodega">Bodega</option>
<option value="Oiti">Oiti</option>
<option value="Gran Sam">Gran Sam</option>
</select>
<button onclick="guardar()">Guardar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
 getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 TU FIREBASE (sin login)
const app = initializeApp({
 apiKey:"AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
 authDomain:"permitidos-step.firebaseapp.com",
 projectId:"permitidos-step"
});

const db = getFirestore(app);
let productos = [];
let ventas = [];

// NAV
window.nav=(id)=>{
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// MODAL
window.openModal=()=>modal.style.display='flex';

// GUARDAR
window.guardar=async()=>{
 let p={
  nombre:nombre.value,
  color:color.value,
  compra:+compra.value,
  venta:+venta.value,
  local:local.value
 };

 await addDoc(collection(db,"productos"),p);
 modal.style.display='none';
}

// 🔥 TIEMPO REAL (CLAVE)
onSnapshot(collection(db,"productos"),snap=>{
 productos=[];
 snap.forEach(d=>productos.push({...d.data(),id:d.id}));
 render();
});

// MOVER
window.mover=async(id,nuevo)=>{
 await updateDoc(doc(db,"productos",id),{local:nuevo});
}

// VENDER
window.vender=async(p)=>{
 ventas.push(p);
 await deleteDoc(doc(db,"productos",p.id));
 render();
}

// RENDER
function render(){
 renderBodega();
 renderLocales();
 renderReportes();
}

// BODEGA
function renderBodega(){
 let html="<h2>Bodega</h2>";
 productos.filter(p=>p.local==="Bodega").forEach(p=>{
  html+=`<div class="card">${p.nombre}
  <br>
  <button onclick="mover('${p.id}','Oiti')">Oiti</button>
  <button onclick="mover('${p.id}','Gran Sam')">Gran Sam</button>
  </div>`;
 });
 bodega.innerHTML=html;
}

// LOCALES
function renderLocales(){
 let html="<h2>Locales</h2>";
 ["Oiti","Gran Sam"].forEach(l=>{
  html+=`<h3>${l}</h3>`;
  productos.filter(p=>p.local===l).forEach(p=>{
   html+=`<div class="card">${p.nombre}
   <br>
   <button onclick='vender(${JSON.stringify(p)})'>VENDER</button>
   <button onclick="mover('${p.id}','Bodega')">DEVOLVER</button>
   </div>`;
  });
 });
 locales.innerHTML=html;
}

// REPORTES
function renderReportes(){
 let total=ventas.reduce((a,b)=>a+b.venta,0);
 let costo=ventas.reduce((a,b)=>a+b.compra,0);
 let ganancia=total-costo;

 reportes.innerHTML=`
 <h2>Reporte</h2>
 Ventas: $${total}<br>
 Ganancia: $${ganancia}
 `;
}
</script>

</body>
</html>
