<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Permitidos Monka - Control Total</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #d4af37; --bg: #0f0f0f; --surface: #1e1e1e; --success: #2e7d32; --error: #ff4444; --info: #0288d1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        .header { background: var(--surface); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav { display: flex; background: var(--surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 12px; border: none; background: none; color: #888; font-weight: bold; font-size: 0.7rem; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 8px; background: #000; }
        .stat-box { text-align: center; font-size: 0.6rem; padding: 5px; border-radius: 5px; background: #111; }
        .stat-val { display: block; font-size: 0.8rem; font-weight: bold; margin-top: 2px; }
        .mall-group { margin: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .mall-header { background: #252525; padding: 10px; font-weight: bold; color: var(--primary); font-size: 0.85rem; }
        .permitido-card { background: var(--surface); padding: 12px; border-bottom: 1px solid #333; }
        .size-tag { background: #333; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; border: 1px solid #444; display: inline-block; margin-top: 5px; }
        .low-stock { color: var(--error); border-color: var(--error); font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .filter-bar { display: flex; gap: 5px; overflow-x: auto; padding: 10px; background: #151515; }
        .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid #444; background: #222; color: #aaa; font-size: 0.65rem; white-space: nowrap; }
        .filter-btn.active { background: var(--primary); color: black; border-color: var(--primary); }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--primary); border: none; font-size: 24px; z-index: 100; color: black; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; background: var(--primary); color: black; text-transform: uppercase; }
        .btn-status { flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; margin: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
          apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
          authDomain: "permitidos-step.firebaseapp.com",
          projectId: "permitidos-step",
          storageBucket: "permitidos-step.firebasestorage.app",
          messagingSenderId: "790890287189",
          appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const { useState, useEffect } = React;

        const fCurrency = (val) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val);

        function App() {
            const [tab, setTab] = useState('permitidos');
            const [inventory, setInventory] = useState([]);
            const [permitidos, setPermitidos] = useState([]);
            const [history, setHistory] = useState([]);
            const [malls] = useState(["OITI", "GRAN SAM", "IMPERIO", "MINITIENDAS"]);
            const [filterMall, setFilterMall] = useState('TODOS');
            const [showInvForm, setShowInvForm] = useState(false);
            const [showAdd, setShowAdd] = useState(false);
            const [sizesInput, setSizesInput] = useState([{ size: '', qty: '' }]);

            useEffect(() => {
                db.collection("inventory").onSnapshot(s => setInventory(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("permitidos").onSnapshot(s => setPermitidos(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("history").orderBy("closedAt", "desc").limit(50).onSnapshot(s => setHistory(s.docs.map(d => d.data())));
            }, []);

            const addProduct = async (e) => {
                e.preventDefault();
                const f = e.target;
                const sMap = {};
                sizesInput.forEach(s => { if(s.size) sMap[s.size.toUpperCase()] = parseInt(s.qty) || 0; });
                await db.collection("inventory").add({
                    name: f.n.value.toUpperCase(), ref: f.r.value.toUpperCase(), color: f.c.value.toUpperCase(),
                    buyPrice: parseFloat(f.bp.value), sellPrice: parseFloat(f.sp.value), sizes: sMap
                });
                setShowInvForm(false); setSizesInput([{size:'', qty:''}]); f.reset();
            };

            const deliverProduct = async (e) => {
                e.preventDefault();
                const f = e.target;
                const p = inventory.find(i => i.id === f.pId.value);
                const q = parseInt(f.q.value);
                const sz = f.sz.value;
                await db.collection("permitidos").add({
                    mall: f.m.value, local: f.l.value, name: p.name, ref: p.ref, color: p.color, size: sz,
                    qty: q, sellPrice: p.sellPrice, buyPrice: p.buyPrice, date: new Date().toLocaleDateString()
                });
                const newS = {...p.sizes}; newS[sz] -= q;
                await db.collection("inventory").doc(p.id).update({ sizes: newS });
                setShowAdd(false);
            };

            const resolveStatus = async (item, status) => {
                if (status === 'sold') {
                    await db.collection("history").add({ ...item, status: 'sold', profit: (item.sellPrice - item.buyPrice) * item.qty, closedAt: new Date().toLocaleString() });
                } else {
                    const p = inventory.find(x => x.ref === item.ref && x.color === item.color);
                    if(p) { const nS = {...p.sizes}; nS[item.size] = (nS[item.size] || 0) + item.qty; await db.collection("inventory").doc(p.id).update({ sizes: nS }); }
                }
                await db.collection("permitidos").doc(item.id).delete();
            };

            const historyFiltered = filterMall === 'TODOS' ? history : history.filter(h => h.mall === filterMall);

            return (
                <div>
                    <div className="header"><h1>PERMITIDOS MONKA ☁️</h1></div>
                    <div className="nav">
                        <button className={`nav-btn ${tab === 'permitidos' ? 'active' : ''}`} onClick={() => setTab('permitidos')}>LOCALES</button>
                        <button className={`nav-btn ${tab === 'inventario' ? 'active' : ''}`} onClick={() => setTab('inventario')}>BODEGA</button>
                        <button className={`nav-btn ${tab === 'cierre' ? 'active' : ''}`} onClick={() => setTab('cierre')}>HISTORIAL</button>
                    </div>

                    {tab === 'permitidos' && (
                        <div>
                            {malls.map(m => {
                                const items = permitidos.filter(p => p.mall === m);
                                if(items.length === 0) return null;
                                return (
                                    <div key={m} className="mall-group">
                                        <div className="mall-header">📍 {m}</div>
                                        {items.map(p => (
                                            <div key={p.id} className="permitido-card">
                                                <b>{p.local}</b> - <span style={{color:'var(--primary)'}}>{p.name} ({p.size})</span>
                                                <div style={{display:'flex', marginTop:10}}>
                                                    <button className="btn-status" style={{background:'var(--success)'}} onClick={() => resolveStatus(p, 'sold')}>VENDIDO</button>
                                                    <button className="btn-status" style={{background:'var(--error)'}} onClick={() => resolveStatus(p, 'returned')}>DEVUELTO</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {tab === 'inventario' && (
                        <div style={{padding:10}}>
                            <button className="btn-main" onClick={() => setShowInvForm(true)}>+ AGREGAR PRODUCTO</button>
                            {inventory.map(p => (
                                <div key={p.id} style={{background: 'var(--surface)', padding:15, margin:'10px 0', borderRadius:8, borderLeft:'4px solid var(--primary)'}}>
                                    <div style={{display:'flex', justifyContent:'space-between'}}><b>{p.name}</b> <span>{fCurrency(p.sellPrice)}</span></div>
                                    <small>{p.color} | Ref: {p.ref}</small>
                                    <div style={{marginTop:8}}>
                                        {Object.entries(p.sizes).map(([s, q]) => (
                                            <span key={s} className={`size-tag ${q <= 2 ? 'low-stock' : ''}`}>{s}: {q}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'cierre' && (
                        <div>
                            <div className="filter-bar">
                                <button className={`filter-btn ${filterMall === 'TODOS' ? 'active' : ''}`} onClick={() => setFilterMall('TODOS')}>TODOS</button>
                                {malls.map(m => (
                                    <button key={m} className={`filter-btn ${filterMall === m ? 'active' : ''}`} onClick={() => setFilterMall(m)}>{m}</button>
                                ))}
                            </div>
                            <div style={{padding:10}}>
                                {historyFiltered.map((h, i) => (
                                    <div key={i} style={{background:'#222', padding:12, marginBottom:10, borderRadius:8, borderLeft:'4px solid #25d366'}}>
                                        <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.6rem', color:'#aaa'}}><span>{h.closedAt}</span><span>+{fCurrency(h.profit)}</span></div>
                                        <div style={{fontSize:'0.85rem', margin:'4px 0'}}><strong>{h.name}</strong> ({h.size}) en {h.mall}</div>
                                        <button className="btn-status" style={{background:'#25d366', marginTop:5, width:'100%'}} onClick={() => window.open(`https://wa.me/?text=*REPORTE MONKA*%0A📍 ${h.mall}%0A📦 ${h.name}%0A📏 Talla: ${h.size}%0A💵 ${fCurrency(h.sellPrice)}`, '_blank')}>WHATSAPP</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <button className="fab" onClick={() => setShowAdd(true)}>+</button>

                    {showAdd && (
                        <div className="modal">
                            <h3>Registrar Salida</h3>
                            <form onSubmit={deliverProduct}>
                                <label>CC:</label><select name="m">{malls.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                <label>Local:</label><input name="l" required />
                                <label>Producto:</label>
                                <select name="pId" required onChange={(e) => {
                                    const p = inventory.find(i => i.id === e.target.value);
                                    window.szs = p ? Object.keys(p.sizes).filter(s => p.sizes[s] > 0) : [];
                                    setTab(tab); 
                                }}>
                                    <option value="">Seleccione...</option>
                                    {inventory.map(i => <option key={i.id} value={i.id}>{i.name} - {i.color}</option>)}
                                </select>
                                <label>Talla:</label><select name="sz">{(window.szs || []).map(s => <option key={s} value={s}>{s}</option>)}</select>
                                <label>Cantidad:</label><input name="q" type="number" defaultValue="1" required />
                                <button type="submit" className="btn-main">ENTREGAR</button>
                                <button type="button" className="btn-main" style={{background:'#444'}} onClick={()=>setShowAdd(false)}>CERRAR</button>
                            </form>
                        </div>
                    )}

                    {showInvForm && (
                        <div className="modal">
                            <h3>Nuevo Producto</h3>
                            <form onSubmit={addProduct}>
                                <label>Nombre:</label><input name="n" required />
                                <label>Ref:</label><input name="r" required />
                                <label>Color:</label><input name="c" required />
                                <label>Costo COP:</label><input name="bp" type="number" required />
                                <label>Venta COP:</label><input name="sp" type="number" required />
                                <label>Tallas:</label>
                                {sizesInput.map((s, i) => (
                                    <div key={i} style={{display:'flex', gap:5, marginBottom:5}}>
                                        <input placeholder="Talla" value={s.size} onChange={e => { const n = [...sizesInput]; n[i].size = e.target.value; setSizesInput(n); }} />
                                        <input placeholder="Cant" type="number" value={s.qty} onChange={e => { const n = [...sizesInput]; n[i].qty = e.target.value; setSizesInput(n); }} />
                                    </div>
                                ))}
                                <button type="button" onClick={() => setSizesInput([...sizesInput, {size:'', qty:''}])} style={{background:'none', color:'var(--primary)', border:'1px dashed #d4af37', padding:10, width:'100%', borderRadius:8}}>+ Añadir talla</button>
                                <button type="submit" className="btn-main">GUARDAR</button>
                                <button type="button" className="btn-main" style={{background:'#444', marginTop:10}} onClick={()=>setShowInvForm(false)}>CANCELAR</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
