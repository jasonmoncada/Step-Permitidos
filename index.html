<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monka Pro 4.0</title><style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header{display:flex;justify-content:space-around;background:#111;padding:10px}
header button{background:none;border:none;color:#d4af37;font-weight:bold}
.section{display:none;padding:10px}
.active{display:block}
.card{background:#1a1a1a;padding:12px;margin:8px 0;border-radius:12px}
input,select{width:100%;margin:5px 0;padding:10px;border-radius:6px;border:none}
button{background:#d4af37;border:none;padding:10px;border-radius:6px}
.fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;font-size:28px;background:#d4af37}
</style></head>
<body><header id="menu" style="display:none">
<button onclick="nav('bodega')">BODEGA</button>
<button onclick="nav('locales')">LOCALES</button>
<button onclick="nav('reportes')">REPORTES</button>
<button onclick="nav('dashboard')">DASH</button>
</header><div id="login" class="section active">
<h2>Login</h2>
<input id="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div><div id="bodega" class="section"></div>
<div id="locales" class="section"></div>
<div id="reportes" class="section"></div>
<div id="dashboard" class="section"></div><button class="fab" onclick="openModal()" id="fab" style="display:none">+</button>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000a;justify-content:center;align-items:center">
<div style="background:#111;padding:20px;width:90%;border-radius:10px">
<h3>Producto</h3>
<input id="nombre" placeholder="Nombre">
<input id="ref" placeholder="REF">
<input id="color" placeholder="Color">
<input id="compra" type="number" placeholder="Compra">
<input id="venta" type="number" placeholder="Venta">
<input id="tallas" placeholder="S:2,M:3">
<select id="localSelect"></select>
<button onclick="guardarProducto()">Guardar</button>
</div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
 authDomain:"permitidos-step.firebaseapp.com",
 projectId:"permitidos-step"
});

const auth = getAuth(app);
const db = getFirestore(app);

let productos=[];
let ventas=[];
let locales=['Oiti','Gran Sam'];

window.login=async()=>{
 try{
  await signInWithEmailAndPassword(auth,email.value,password.value);
  login.style.display='none';
  menu.style.display='flex';
  fab.style.display='block';
  nav('bodega');
  cargar();
 }catch(e){alert('Error login');}
}

window.nav=(id)=>{
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

window.openModal=()=>{
 modal.style.display='flex';
 localSelect.innerHTML=locales.map(l=>`<option>${l}</option>`).join('');
}

const closeModal=()=>modal.style.display='none';

function parseTallas(txt){
 let o={};
 txt.split(',').forEach(x=>{
  let [t,c]=x.split(':');
  o[t]=Number(c);
 });
 return o;
}

window.guardarProducto=async()=>{
 let p={
  nombre:nombre.value,
  ref:ref.value,
  color:color.value,
  compra:+compra.value,
  venta:+venta.value,
  tallas:parseTallas(tallas.value),
  local:localSelect.value
 };
 await addDoc(collection(db,'productos'),p);
 closeModal();
 cargar();
}

async function cargar(){
 let snap=await getDocs(collection(db,'productos'));
 productos=[];
 snap.forEach(d=>productos.push({...d.data(),id:d.id}));
 render();
}

function render(){
 renderBodega();
 renderLocales();
 renderReportes();
 renderDashboard();
}

function renderBodega(){
 let html='<h2>Bodega</h2>';
 productos.forEach(p=>{
  html+=`<div class="card">${p.nombre} (${p.local})</div>`;
 });
 bodega.innerHTML=html;
}

function renderLocales(){
 let html='<h2>Locales</h2>';
 locales.forEach(l=>{
  html+=`<h3>${l}</h3>`;
  productos.filter(p=>p.local==l).forEach(p=>{
   html+=`<div class="card">${p.nombre} <button onclick="vender(${p.venta},${p.compra})">Vender</button></div>`;
  });
 });
 locales.innerHTML=html;
}

window.vender=(v,c)=>{
 ventas.push({venta:v,compra:c});
 render();
}

function renderReportes(){
 let total=ventas.reduce((a,b)=>a+b.venta,0);
 let costo=ventas.reduce((a,b)=>a+b.compra,0);
 let ganancia=total-costo;
 reportes.innerHTML=`<h2>Reporte</h2>Ventas:$${total}<br>Ganancia:$${ganancia}`;
}

function renderDashboard(){
 dashboard.innerHTML=`<h2>Dashboard</h2>Total ventas: ${ventas.length}`;
}

</script></body>
</html>
