<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Permitidos Monka - Gestión de Tallas</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #d4af37; --bg: #0f0f0f; --surface: #1e1e1e; --success: #2e7d32; --error: #c62828; --info: #0288d1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        .header { background: var(--surface); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav { display: flex; background: var(--surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 12px; border: none; background: none; color: #888; font-weight: bold; font-size: 0.7rem; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .mall-group { margin: 10px; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .mall-header { background: #252525; padding: 10px; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; font-size: 0.9rem; }
        .permitido-card { background: var(--surface); padding: 12px; border-bottom: 1px solid #333; }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 8px; background: #000; }
        .stat-box { text-align: center; font-size: 0.65rem; padding: 5px; border-radius: 5px; background: #111; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--primary); border: none; font-size: 24px; z-index: 100; color: black; font-weight: bold;}
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        label { display: block; margin-top: 12px; color: var(--primary); font-size: 0.8rem; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; background: var(--primary); color: black; text-transform: uppercase; }
        .btn-status { flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; margin: 5px; font-size: 0.7rem; }
        .size-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
        .size-tag { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-right: 5px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
          apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
          authDomain: "permitidos-step.firebaseapp.com",
          projectId: "permitidos-step",
          storageBucket: "permitidos-step.firebasestorage.app",
          messagingSenderId: "790890287189",
          appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('permitidos');
            const [showAdd, setShowAdd] = useState(false);
            const [showInvForm, setShowInvForm] = useState(false);
            const [inventory, setInventory] = useState([]);
            const [permitidos, setPermitidos] = useState([]);
            const [history, setHistory] = useState([]);
            const [malls, setMalls] = useState(["OITI", "GRAN SAM", "IMPERIO", "MINITIENDAS"]);
            const [loading, setLoading] = useState(true);
            const [sizesInput, setSizesInput] = useState([{ size: '', qty: '' }]);

            useEffect(() => {
                const unsubInv = db.collection("inventory").onSnapshot(snap => {
                    setInventory(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
                const unsubPerm = db.collection("permitidos").onSnapshot(snap => {
                    setPermitidos(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
                const unsubHist = db.collection("history").orderBy("closedAt", "desc").limit(50).onSnapshot(snap => {
                    setHistory(snap.docs.map(d => d.data()));
                    setLoading(false);
                });
                return () => { unsubInv(); unsubPerm(); unsubHist(); };
            }, []);

            const addProduct = async (e) => {
                e.preventDefault();
                const f = e.target;
                const finalSizes = {};
                sizesInput.forEach(s => { if(s.size) finalSizes[s.size.toUpperCase()] = parseInt(s.qty) || 0; });

                await db.collection("inventory").add({
                    name: f.prodName.value.toUpperCase(),
                    ref: f.ref.value.toUpperCase(),
                    color: f.color.value.toUpperCase(),
                    buyPrice: parseFloat(f.buyPrice.value),
                    sellPrice: parseFloat(f.sellPrice.value),
                    sizes: finalSizes
                });
                setShowInvForm(false);
                setSizesInput([{ size: '', qty: '' }]);
                f.reset();
            };

            const deliverProduct = async (e) => {
                e.preventDefault();
                const f = e.target;
                const qty = parseInt(f.qty.value);
                const size = f.size.value;
                const prod = inventory.find(p => p.id === f.prodId.value);
                
                await db.collection("permitidos").add({
                    mall: f.mall.value, local: f.local.value, 
                    name: prod.name, ref: prod.ref, color: prod.color, size,
                    qty, sellPrice: prod.sellPrice, buyPrice: prod.buyPrice,
                    date: new Date().toLocaleDateString()
                });

                const newSizes = { ...prod.sizes };
                newSizes[size] = (newSizes[size] || 0) - qty;
                await db.collection("inventory").doc(prod.id).update({ sizes: newSizes });
                setShowAdd(false);
            };

            const resolveStatus = async (item, status) => {
                if (status === 'sold') {
                    const profit = (item.sellPrice - item.buyPrice) * item.qty;
                    await db.collection("history").add({
                        ...item, status: 'sold', profit, closedAt: new Date().toLocaleString()
                    });
                } else {
                    const prod = inventory.find(p => p.ref === item.ref && p.color === item.color);
                    if(prod) {
                        const newSizes = { ...prod.sizes };
                        newSizes[item.size] = (newSizes[item.size] || 0) + item.qty;
                        await db.collection("inventory").doc(prod.id).update({ sizes: newSizes });
                    }
                }
                await db.collection("permitidos").doc(item.id).delete();
            };

            const sendWhatsApp = (h) => {
                const text = `*VENTA - PERMITIDOS MONKA*%0A📍 CC: ${h.mall}%0A🏠 Local: ${h.local}%0A📦: ${h.name}%0A🎨: ${h.color}%0A📏 Talla: ${h.size}%0A💵: $${h.sellPrice.toLocaleString()}`;
                window.open(`https://wa.me/?text=${text}`, '_blank');
            };

            if(loading) return <div style={{padding:20, textAlign:'center'}}>Cargando Permitidos Monka...</div>;

            return (
                <div>
                    <div className="header"><h1>PERMITIDOS MONKA ☁️</h1></div>
                    <div className="nav">
                        <button className={`nav-btn ${tab === 'permitidos' ? 'active' : ''}`} onClick={() => setTab('permitidos')}>EN LOCALES</button>
                        <button className={`nav-btn ${tab === 'inventario' ? 'active' : ''}`} onClick={() => setTab('inventario')}>BODEGA</button>
                        <button className={`nav-btn ${tab === 'cierre' ? 'active' : ''}`} onClick={() => setTab('cierre')}>HISTORIAL</button>
                    </div>

                    {tab === 'permitidos' && (
                        <div style={{paddingTop:10}}>
                            {malls.map(m => {
                                const items = permitidos.filter(p => p.mall === m);
                                if(items.length === 0) return null;
                                return (
                                    <div key={m} className="mall-group">
                                        <div className="mall-header">📍 {m}</div>
                                        {items.map(p => (
                                            <div key={p.id} className="permitido-card">
                                                <b>{p.local}</b> - <span style={{color: 'var(--primary)'}}>{p.name} ({p.color})</span><br/>
                                                <small>Talla: <b>{p.size}</b> | Cant: {p.qty}</small>
                                                <div style={{display:'flex', marginTop:10}}>
                                                    <button className="btn-status" style={{background: 'var(--success)'}} onClick={() => resolveStatus(p, 'sold')}>VENDIDO</button>
                                                    <button className="btn-status" style={{background: 'var(--error)'}} onClick={() => resolveStatus(p, 'returned')}>DEVOLUCIÓN</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {tab === 'inventario' && (
                        <div style={{padding:10}}>
                            <button className="btn-main" onClick={() => setShowInvForm(true)}>+ NUEVO PRODUCTO</button>
                            {inventory.map(p => (
                                <div key={p.id} style={{background: 'var(--surface)', padding:15, margin:'10px 0', borderRadius:8}}>
                                    <div style={{display:'flex', justifyContent:'space-between'}}>
                                        <b>{p.name}</b>
                                        <span style={{color: 'var(--primary)'}}>${p.sellPrice.toLocaleString()}</span>
                                    </div>
                                    <small>{p.color} | {p.ref}</small><br/>
                                    <div style={{marginTop: 8}}>
                                        {Object.entries(p.sizes).map(([s, q]) => (
                                            <span key={s} className="size-tag">{s}: <b>{q}</b></span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'cierre' && (
                        <div style={{padding:15}}>
                            {history.map((h, i) => (
                                <div key={i} style={{background: '#222', padding: '12px', marginBottom: '10px', borderRadius: '8px', borderLeft: '4px solid #25d366'}}>
                                    <small>{h.closedAt}</small><br/>
                                    <strong>{h.name} ({h.color}) - Talla {h.size}</strong> en {h.mall}<br/>
                                    <button className="btn-status" style={{background:'#25d366', marginTop:5, width:'auto'}} onClick={() => sendWhatsApp(h)}>WHATSAPP</button>
                                </div>
                            ))}
                        </div>
                    )}

                    <button className="fab" onClick={() => setShowAdd(true)}>+</button>

                    {showAdd && (
                        <div className="modal">
                            <h3>Registrar Salida</h3>
                            <form onSubmit={deliverProduct}>
                                <label>CC:</label>
                                <select name="mall">{malls.map(m => <option key={m} value={m}>{m}</option>)}</select>
                                <label>Local:</label><input name="local" required />
                                <label>Producto:</label>
                                <select name="prodId" onChange={(e) => {
                                    const p = inventory.find(i => i.id === e.target.value);
                                    window.currentSizes = p ? Object.keys(p.sizes).filter(s => p.sizes[s] > 0) : [];
                                    setTab(tab); // Hack para refrescar
                                }}>
                                    <option value="">Seleccione...</option>
                                    {inventory.map(i => <option key={i.id} value={i.id}>{i.name} - {i.color}</option>)}
                                </select>
                                <label>Talla:</label>
                                <select name="size">
                                    {(window.currentSizes || []).map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <label>Cantidad:</label><input name="qty" type="number" defaultValue="1" required />
                                <button type="submit" className="btn-main">ENTREGAR</button>
                                <button type="button" className="btn-main" style={{background:'#444'}} onClick={()=>setShowAdd(false)}>CERRAR</button>
                            </form>
                        </div>
                    )}

                    {showInvForm && (
                        <div className="modal">
                            <h3>Nuevo Producto</h3>
                            <form onSubmit={addProduct}>
                                <label>Nombre:</label><input name="prodName" required />
                                <label>Ref:</label><input name="ref" required />
                                <label>Color:</label><input name="color" required />
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
                                    <div><label>Costo:</label><input name="buyPrice" type="number" required /></div>
                                    <div><label>Venta:</label><input name="sellPrice" type="number" required /></div>
                                </div>
                                
                                <label>Stock por Tallas:</label>
                                {sizesInput.map((s, i) => (
                                    <div key={i} className="size-row">
                                        <input placeholder="Talla (S, 38...)" value={s.size} onChange={e => {
                                            const newS = [...sizesInput]; newS[i].size = e.target.value; setSizesInput(newS);
                                        }} />
                                        <input placeholder="Cant" type="number" value={s.qty} onChange={e => {
                                            const newS = [...sizesInput]; newS[i].qty = e.target.value; setSizesInput(newS);
                                        }} />
                                    </div>
                                ))}
                                <button type="button" onClick={() => setSizesInput([...sizesInput, {size:'', qty:''}])} style={{background:'none', color:'var(--primary)', border:'1px dashed var(--primary)', padding:10, width:'100%', borderRadius:8}}>+ Añadir otra talla</button>
                                
                                <button type="submit" className="btn-main">GUARDAR TODO</button>
                                <button type="button" className="btn-main" style={{background:'#444'}} onClick={()=>setShowInvForm(false)}>CANCELAR</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
