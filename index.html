<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monka Pro - Gestión</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --gold: #d4af37;
            --text: #ffffff;
            --gray: #888888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-top: 60px; padding-bottom: 80px; }
        
        /* Navbar */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background-color: var(--bg); border-bottom: 1px solid var(--gold); display: flex; z-index: 100; align-items: center; }
        .tab { flex: 1; text-align: center; color: var(--gray); padding: 15px 0; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .settings-btn { padding: 0 15px; color: var(--gold); font-size: 24px; cursor: pointer; background: none; border: none; }
        .settings-btn:active { transform: scale(0.9); }

        /* Vistas */
        .view { display: none; padding: 15px; }
        .view.active { display: block; }

        /* Tarjetas */
        .card { background-color: var(--surface); border: 1px solid var(--gold); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .card-title { color: var(--gold); font-size: 18px; margin-bottom: 5px; display: flex; justify-content: space-between;}
        .card-text { font-size: 14px; margin-bottom: 3px; color: #ccc;}
        .tag { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px;}
        
        /* Botones */
        .btn { background-color: var(--gold); color: #000; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; transition: 0.1s; }
        .btn:active { background-color: #b8962e; transform: scale(0.97); }
        .btn-outline { background-color: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-group { display: flex; gap: 10px; }

        /* FAB */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background-color: var(--gold); color: #000; font-size: 30px; border: none; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); z-index: 100; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s;}
        .fab:active { transform: scale(0.9); }

        /* Formularios e Inputs */
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background-color: var(--surface); border: 1px solid #333; border-radius: 6px; color: var(--text); font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: var(--gold); }
        
        /* Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; overflow-y: auto; padding: 20px; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); border: 1px solid var(--gold); width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--gold); font-size: 18px; font-weight: bold;}
        .close-modal { color: var(--gray); font-size: 24px; cursor: pointer; }

        /* Utilidades */
        .search-bar { margin-bottom: 15px; }
        .size-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .size-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .stat-box { background: var(--surface); border-left: 4px solid var(--gold); padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        .stat-title { font-size: 12px; color: var(--gray); }
        .stat-value { font-size: 24px; color: var(--gold); font-weight: bold; }
        .history-item { border-bottom: 1px solid #333; padding: 10px 0; font-size: 13px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="tab active" onclick="switchTab('locales')">Locales</div>
        <div class="tab" onclick="switchTab('bodega')">Bodega</div>
        <div class="tab" onclick="switchTab('reportes')">Reportes</div>
        <button class="settings-btn" onclick="openModal('modalSettings')">⚙️</button>
    </nav>

    <main id="locales" class="view active">
        <select id="filterMall" onchange="renderLocales()">
            <option value="ALL">Todo Junto (Todos los Locales)</option>
        </select>
        <div id="localesList"></div>
        <button class="fab" onclick="openModal('modalDispatch')">+</button>
    </main>

    <main id="bodega" class="view">
        <input type="text" id="searchBodega" class="search-bar" placeholder="Buscar por nombre, REF o color..." onkeyup="renderBodega()">
        <div id="bodegaList"></div>
        <button class="fab" onclick="openModal('modalBodega')">+</button>
    </main>

    <main id="reportes" class="view">
        <div class="stat-box">
            <div class="stat-title">VENTAS HOY</div>
            <div class="stat-value" id="valVentas">$0</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">COSTO TOTAL HOY</div>
            <div class="stat-value" id="valCosto" style="color:#ff6b6b;">$0</div>
        </div>
        <div class="stat-box">
            <div class="stat-title">GANANCIA NETA</div>
            <div class="stat-value" id="valGanancia" style="color:#4cd137;">$0</div>
        </div>
        <button class="btn" style="background:#25D366; color:#fff;" onclick="enviarWhatsApp()">Enviar Reporte a WhatsApp</button>
        
        <h3 style="color:var(--gold); margin: 20px 0 10px;">Últimos Movimientos</h3>
        <div id="historyList" style="background: var(--surface); padding: 10px; border-radius: 8px;"></div>
    </main>

    <div id="modalSettings" class="modal">
        <div class="modal-content">
            <div class="modal-header">Gestión de Locales/CC <span class="close-modal" onclick="closeModal('modalSettings')">&times;</span></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="newMallName" placeholder="Ej: Oiti, Gran Sam">
                <button class="btn" style="width:auto; margin-top:0; margin-bottom:12px;" onclick="addMall()">Añadir</button>
            </div>
            <div id="settingsMallsList"></div>
        </div>
    </div>

    <div id="modalBodega" class="modal">
        <div class="modal-content">
            <div class="modal-header">Nuevo Producto <span class="close-modal" onclick="closeModal('modalBodega')">&times;</span></div>
            <input type="text" id="prodName" placeholder="Nombre (Ej: Tenis Oversize)">
            <input type="text" id="prodRef" placeholder="Referencia (REF)">
            <input type="text" id="prodColor" placeholder="Color">
            <input type="number" id="prodCompra" placeholder="Precio Compra ($)">
            <input type="number" id="prodVenta" placeholder="Precio Venta ($)">
            
            <div style="border-top: 1px solid #333; margin-top: 10px; padding-top: 10px;">
                <label style="font-size: 12px; color: var(--gold);">Gestión de Tallas</label>
                <div class="size-row">
                    <input type="text" id="tempSize" placeholder="Talla (Ej: 40 o L)" style="margin-bottom:0;">
                    <input type="number" id="tempQty" placeholder="Cant." style="margin-bottom:0; width:80px;">
                    <button class="btn btn-outline" style="width:auto; margin-top:0;" onclick="addTempSize()">+</button>
                </div>
                <div id="tempSizeList" class="size-list"></div>
            </div>
            
            <button class="btn" onclick="saveProduct()">Guardar en Bodega</button>
        </div>
    </div>

    <div id="modalDispatch" class="modal">
        <div class="modal-content">
            <div class="modal-header">Enviar a Local <span class="close-modal" onclick="closeModal('modalDispatch')">&times;</span></div>
            <select id="dispatchProd" onchange="updateDispatchSizes()"><option value="">Selecciona Producto...</option></select>
            <select id="dispatchSize"><option value="">Selecciona Talla...</option></select>
            <select id="dispatchMall"><option value="">Selecciona Centro Comercial...</option></select>
            <button class="btn" onclick="dispatchProduct()">Registrar Salida</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
            authDomain: "permitidos-step.firebaseapp.com",
            projectId: "permitidos-step",
            storageBucket: "permitidos-step.firebasestorage.app",
            messagingSenderId: "790890287189",
            appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Estado Global
        let dbProducts = [];
        let dbDispatches = [];
        let dbMalls = [];
        let tempSizes = [];

        // Funciones UI Generales
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'bodega') renderBodega();
            if(tabId === 'locales') renderLocales();
            if(tabId === 'reportes') calcReportes();
        };

        window.openModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => { document.getElementById(id).classList.remove('active'); tempSizes = []; renderTempSizes(); }
        const formatMoney = (num) => new Intl.NumberFormat('es-CO').format(num);

        // Historial Global
        async function logHistory(action, details) {
            await addDoc(collection(db, "history"), { action, details, timestamp: serverTimestamp() });
        }

        // --- GESTIÓN DE LOCALES (AJUSTES) ---
        onSnapshot(collection(db, "malls"), (snapshot) => {
            dbMalls = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderMallsSettings();
            updateMallSelects();
        });

        window.addMall = async () => {
            const name = document.getElementById('newMallName').value.trim();
            if(!name) return;
            await addDoc(collection(db, "malls"), { name });
            document.getElementById('newMallName').value = '';
        };

        window.deleteMall = async (id) => {
            if(confirm('¿Eliminar este local?')) await deleteDoc(doc(db, "malls", id));
        };

        function renderMallsSettings() {
            const html = dbMalls.map(m => `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid #333; padding-bottom:5px;">
                    <span>${m.name}</span>
                    <span style="color:red; cursor:pointer;" onclick="deleteMall('${m.id}')">X</span>
                </div>
            `).join('');
            document.getElementById('settingsMallsList').innerHTML = html;
        }

        function updateMallSelects() {
            const filterSelect = document.getElementById('filterMall');
            const dispatchSelect = document.getElementById('dispatchMall');
            const currentFilter = filterSelect.value;
            
            let options = '<option value="ALL">Todo Junto (Todos los Locales)</option>';
            let dispatchOptions = '<option value="">Selecciona Centro Comercial...</option>';
            
            dbMalls.forEach(m => {
                options += `<option value="${m.name}">${m.name}</option>`;
                dispatchOptions += `<option value="${m.name}">${m.name}</option>`;
            });
            
            filterSelect.innerHTML = options;
            dispatchSelect.innerHTML = dispatchOptions;
            filterSelect.value = currentFilter || 'ALL';
        }

        // --- GESTIÓN DE BODEGA ---
        onSnapshot(collection(db, "products"), (snapshot) => {
            dbProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderBodega();
            updateDispatchProducts();
        });

        window.addTempSize = () => {
            const s = document.getElementById('tempSize').value.trim();
            const q = parseInt(document.getElementById('tempQty').value);
            if(s && q > 0) { tempSizes.push({ size: s, qty: q }); renderTempSizes(); }
            document.getElementById('tempSize').value = ''; document.getElementById('tempQty').value = '';
        };

        function renderTempSizes() {
            document.getElementById('tempSizeList').innerHTML = tempSizes.map((t, i) => `
                <span class="tag">${t.size} (x${t.qty}) <span style="color:red; cursor:pointer;" onclick="removeTempSize(${i})">&times;</span></span>
            `).join('');
        }
        window.removeTempSize = (i) => { tempSizes.splice(i, 1); renderTempSizes(); };

        window.saveProduct = async () => {
            const name = document.getElementById('prodName').value.trim();
            const ref = document.getElementById('prodRef').value.trim();
            const color = document.getElementById('prodColor').value.trim();
            const compra = parseFloat(document.getElementById('prodCompra').value);
            const venta = parseFloat(document.getElementById('prodVenta').value);

            if(!name || tempSizes.length === 0) return alert("Faltan datos o tallas.");

            await addDoc(collection(db, "products"), { name, ref, color, compra, venta, sizes: tempSizes });
            await logHistory("Creación", `Creado ${name} (REF: ${ref}) en Bodega.`);
            
            document.querySelectorAll('#modalBodega input').forEach(inpt => inpt.value = '');
            closeModal('modalBodega');
        };

        window.renderBodega = () => {
            const term = document.getElementById('searchBodega').value.toLowerCase();
            const filtered = dbProducts.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.ref.toLowerCase().includes(term) || 
                p.color.toLowerCase().includes(term)
            );

            document.getElementById('bodegaList').innerHTML = filtered.map(p => {
                const totalStock = p.sizes.reduce((acc, curr) => acc + curr.qty, 0);
                const sizesHtml = p.sizes.map(s => `<span class="tag">${s.size}: ${s.qty}</span>`).join('');
                return `
                <div class="card">
                    <div class="card-title">${p.name} <span>Stock: ${totalStock}</span></div>
                    <div class="card-text">REF: ${p.ref} | Color: ${p.color}</div>
                    <div class="card-text">Compra: $${formatMoney(p.compra)} | Venta: $${formatMoney(p.venta)}</div>
                    <div style="margin-top:8px;">${sizesHtml}</div>
                </div>`;
            }).join('');
        };

        // --- GESTIÓN DE SALIDAS (LOCALES) ---
        onSnapshot(query(collection(db, "dispatches"), orderBy("timestamp", "desc")), (snapshot) => {
            dbDispatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderLocales();
            calcReportes();
        });

        function updateDispatchProducts() {
            const select = document.getElementById('dispatchProd');
            select.innerHTML = '<option value="">Selecciona Producto...</option>' + 
                dbProducts.filter(p => p.sizes.some(s => s.qty > 0)).map(p => `<option value="${p.id}">${p.name} (${p.ref})</option>`).join('');
        }

        window.updateDispatchSizes = () => {
            const prodId = document.getElementById('dispatchProd').value;
            const select = document.getElementById('dispatchSize');
            select.innerHTML = '<option value="">Selecciona Talla...</option>';
            if(!prodId) return;
            const prod = dbProducts.find(p => p.id === prodId);
            prod.sizes.filter(s => s.qty > 0).forEach(s => {
                select.innerHTML += `<option value="${s.size}">${s.size} (Disp: ${s.qty})</option>`;
            });
        };

        window.dispatchProduct = async () => {
            const prodId = document.getElementById('dispatchProd').value;
            const size = document.getElementById('dispatchSize').value;
            const mall = document.getElementById('dispatchMall').value;

            if(!prodId || !size || !mall) return alert("Completa todos los campos");

            const prod = dbProducts.find(p => p.id === prodId);
            const sizeIndex = prod.sizes.findIndex(s => s.size === size);
            
            // Restar stock
            const newSizes = [...prod.sizes];
            newSizes[sizeIndex].qty -= 1;
            await updateDoc(doc(db, "products", prodId), { sizes: newSizes });

            // Crear salida
            await addDoc(collection(db, "dispatches"), {
                prodId, name: prod.name, ref: prod.ref, color: prod.color, 
                compra: prod.compra, venta: prod.venta, size, mall, status: 'active',
                timestamp: serverTimestamp()
            });

            await logHistory("Despacho", `Enviado ${prod.name} (Talla ${size}) a ${mall}`);
            
            document.getElementById('dispatchProd').value = '';
            document.getElementById('dispatchSize').innerHTML = '<option value="">Selecciona Talla...</option>';
            closeModal('modalDispatch');
        };

        window.renderLocales = () => {
            const filter = document.getElementById('filterMall').value;
            const active = dbDispatches.filter(d => d.status === 'active');
            const filtered = filter === 'ALL' ? active : active.filter(d => d.mall === filter);

            document.getElementById('localesList').innerHTML = filtered.map(d => `
                <div class="card">
                    <div class="card-title">${d.name} <span class="tag" style="background:#555; color:#fff;">${d.mall}</span></div>
                    <div class="card-text">REF: ${d.ref} | Color: ${d.color} | Talla: <span class="tag">${d.size}</span></div>
                    <div class="card-text">Venta: $${formatMoney(d.venta)}</div>
                    <div class="btn-group" style="margin-top:10px;">
                        <button class="btn" style="background:#2ecc71; color:#fff;" onclick="vender('${d.id}')">VENDIDO $</button>
                        <button class="btn btn-outline" style="color:#ff6b6b; border-color:#ff6b6b;" onclick="devolver('${d.id}')">DEVOLVER</button>
                    </div>
                </div>
            `).join('');
        };

        window.vender = async (id) => {
            const d = dbDispatches.find(d => d.id === id);
            if(!d) return;
            
            await updateDoc(doc(db, "dispatches", id), { status: 'sold', soldAt: serverTimestam
