<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Permitidos Monka - Inventario</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #d4af37; --bg: #0f0f0f; --surface: #1e1e1e; --success: #2e7d32; --error: #c62828; --info: #0288d1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        .header { background: var(--surface); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }
        .nav { display: flex; background: var(--surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 12px; border: none; background: none; color: #888; font-weight: bold; font-size: 0.7rem; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 8px; background: #000; }
        .stat-box { text-align: center; font-size: 0.65rem; padding: 5px; border-radius: 5px; background: #111; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--primary); border: none; font-size: 24px; z-index: 100; color: black; font-weight: bold;}
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; overflow-y: auto; }
        label { display: block; margin-top: 12px; color: var(--primary); font-size: 0.8rem; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; background: var(--primary); color: black; text-transform: uppercase; }
        .btn-status { flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; margin: 5px; font-size: 0.7rem; }
        .btn-cancel { background: #444; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Tu configuración de Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
          authDomain: "permitidos-step.firebaseapp.com",
          projectId: "permitidos-step",
          storageBucket: "permitidos-step.firebasestorage.app",
          messagingSenderId: "790890287189",
          appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('inventario');
            const [showInvForm, setShowInvForm] = useState(false);
            const [inventory, setInventory] = useState([]);

            useEffect(() => {
                const unsub = db.collection("inventory").onSnapshot(snap => {
                    setInventory(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
                return () => unsub();
            }, []);

            const addProduct = async (e) => {
                e.preventDefault();
                const f = e.target;
                await db.collection("inventory").add({
                    name: f.prodName.value.toUpperCase(),
                    ref: f.ref.value.toUpperCase(),
                    color: f.color.value.toUpperCase(),
                    buyPrice: parseFloat(f.buyPrice.value),
                    sellPrice: parseFloat(f.sellPrice.value),
                    stock: parseInt(f.stock.value)
                });
                setShowInvForm(false);
                f.reset();
            };

            return (
                <div>
                    <div className="header"><h1>PERMITIDOS MONKA ☁️</h1></div>
                    <div className="nav">
                        <button className="nav-btn">PERMITIDOS</button>
                        <button className="nav-btn active">INVENTARIO</button>
                        <button className="nav-btn">HISTORIAL</button>
                    </div>

                    <div className="stats-bar">
                        <div className="stat-box">En locales:<br/><b>0</b></div>
                        <div className="stat-box">Ganancia Hoy:<br/><b style={{color:'#4caf50'}}>$0</b></div>
                        <div className="stat-box">Stock Bodega:<br/><b>{inventory.reduce((a,b)=>a+b.stock,0)}</b></div>
                    </div>

                    <div style={{padding:10}}>
                        <button className="btn-main" onClick={() => setShowInvForm(true)}>+ AGREGAR PRODUCTO</button>
                        {inventory.map(p => (
                            <div key={p.id} style={{background: 'var(--surface)', padding:15, margin:'10px 0', borderRadius:8, borderLeft: '4px solid var(--primary)'}}>
                                <b>{p.name}</b><br/>
                                <small>Color: {p.color} | Ref: {p.ref}</small><br/>
                                <div style={{marginTop: 5, display:'flex', justifyContent:'space-between'}}>
                                    <span>Stock: {p.stock}</span>
                                    <span style={{color: 'var(--primary)'}}>${p.sellPrice.toLocaleString()}</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button className="fab" onClick={() => setShowInvForm(true)}>+</button>

                    {showInvForm && (
                        <div className="modal">
                            <h2>Nuevo Producto</h2>
                            <form onSubmit={addProduct}>
                                <label>Nombre del Producto:</label>
                                <input name="prodName" placeholder="Ej: Nike Jordan" required />
                                
                                <label>Referencia:</label>
                                <input name="ref" placeholder="Ej: REF-001" required />
                                
                                <label>Color:</label>
                                <input name="color" placeholder="Ej: Blanco/Negro" required />
                                
                                <label>Precio Compra (Costo):</label>
                                <input name="buyPrice" type="number" required />
                                
                                <label>Precio Venta:</label>
                                <input name="sellPrice" type="number" required />
                                
                                <label>Stock Inicial:</label>
                                <input name="stock" type="number" required />
                                
                                <button type="submit" className="btn-main">GUARDAR</button>
                                <button type="button" className="btn-main btn-cancel" onClick={()=>setShowInvForm(false)}>CANCELAR</button>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
