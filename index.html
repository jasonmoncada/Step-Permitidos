<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monka Pro Fix</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #d4af37; --bg: #0f0f0f; --surface: #1e1e1e; --success: #2e7d32; --error: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        .header { background: var(--surface); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; background: var(--surface); position: sticky; top: 54px; z-index: 100; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; font-size: 0.7rem; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .card { background: var(--surface); padding: 15px; margin: 10px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .btn-main { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; background: var(--primary); color: black; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; background: #fff; }
        .btn-main:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; display: none; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 30px; background: var(--primary); border: none; font-size: 28px; color: black; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 99; }
        #debug-log { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,0,0,0.1); color: #ff8888; font-size: 10px; padding: 5px; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="debug-log">Iniciando sistema...</div>

    <div class="header">
        <h1 style="margin:0; color:var(--primary); font-size:1rem; letter-spacing:2px;">MONKA PRO ☁️</h1>
    </div>

    <div class="nav">
        <button id="btn-locales" class="nav-btn active" onclick="showTab('locales')">LOCALES</button>
        <button id="btn-bodega" class="nav-btn" onclick="showTab('bodega')">BODEGA</button>
        <button id="btn-historial" class="nav-btn" onclick="showTab('historial')">HISTORIAL</button>
    </div>

    <div id="tab-locales" style="padding:10px;"></div>
    
    <div id="tab-bodega" style="display:none; padding:10px;">
        <button class="btn-main" onclick="openProductModal()">+ NUEVO PRODUCTO</button>
        <div id="inventory-list"></div>
    </div>

    <div id="tab-historial" style="display:none; padding:10px;"></div>

    <button class="fab" onclick="openSalidaModal()">+</button>

    <div id="modal-p" class="modal">
        <h2 id="p-title">Producto</h2>
        <input type="text" id="p-nombre" placeholder="Nombre">
        <input type="text" id="p-color" placeholder="Color">
        <input type="number" id="p-venta" placeholder="Precio Venta">
        <div id="p-sizes"></div>
        <button class="btn-main" style="background:#333; color:var(--primary)" onclick="addSizeField('p-sizes')">+ TALLA</button>
        <button id="p-save-btn" class="btn-main" onclick="processProduct()">GUARDAR</button>
        <button id="p-delete-btn" class="btn-main" style="background:var(--error); display:none;" onclick="deleteProduct()">ELIMINAR PRODUCTO</button>
        <button class="btn-main" style="background:#444;" onclick="closeModal('modal-p')">CANCELAR</button>
    </div>

    <div id="modal-s" class="modal">
        <h2>Salida a Local</h2>
        <select id="s-mall"></select>
        <input type="text" id="s-local" placeholder="Local">
        <select id="s-prod" onchange="updateSalidaSizes()"></select>
        <select id="s-size"></select>
        <button id="s-save-btn" class="btn-main" onclick="processSalida()">ENTREGAR</button>
        <button class="btn-main" style="background:#444;" onclick="closeModal('modal-s')">CERRAR</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
            authDomain: "permitidos-step.firebaseapp.com",
            projectId: "permitidos-step",
            storageBucket: "permitidos-step.firebasestorage.app",
            messagingSenderId: "790890287189",
            appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let inventory = [], permitidos = [], editingId = null;

        // Registro de errores
        function log(msg) { document.getElementById('debug-log').innerText = msg; console.log(msg); }

        // Sincronización
        db.collection("inventory").onSnapshot(s => {
            inventory = s.docs.map(d => ({id: d.id, ...d.data()}));
            renderInventory();
            log("Bodega actualizada");
        }, e => log("Error Bodega: " + e.message));

        db.collection("permitidos").onSnapshot(s => {
            permitidos = s.docs.map(d => ({id: d.id, ...d.data()}));
            renderLocales();
            log("Locales actualizados");
        });

        function showTab(t) {
            ['locales', 'bodega', 'historial'].forEach(id => {
                document.getElementById('tab-'+id).style.display = (id === t ? 'block' : 'none');
                document.getElementById('btn-'+id).classList.toggle('active', id === t);
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function addSizeField(cont, sz='', qt='') {
            const d = document.createElement('div');
            d.style.display='flex'; d.style.gap='5px';
            d.innerHTML = `<input type="text" placeholder="Talla" class="sz-n" value="${sz}">
                           <input type="number" placeholder="Cant" class="sz-q" value="${qt}">`;
            document.getElementById(cont).appendChild(d);
        }

        // --- LÓGICA DE PRODUCTOS ---
        function openProductModal(id = null) {
            editingId = id;
            const p = inventory.find(x => x.id === id);
            document.getElementById('p-title').innerText = id ? "Editar Producto" : "Nuevo Producto";
            document.getElementById('p-nombre').value = id ? p.name : "";
            document.getElementById('p-color').value = id ? p.color : "";
            document.getElementById('p-venta').value = id ? p.sellPrice : "";
            document.getElementById('p-sizes').innerHTML = "";
            document.getElementById('p-delete-btn').style.display = id ? "block" : "none";
            
            if(id && p.sizes) {
                Object.entries(p.sizes).forEach(([s, q]) => addSizeField('p-sizes', s, q));
            } else {
                addSizeField('p-sizes');
            }
            openModal('modal-p');
        }

        async function processProduct() {
            const btn = document.getElementById('p-save-btn');
            btn.disabled = true; btn.innerText = "PROCESANDO...";
            
            const name = document.getElementById('p-nombre').value.toUpperCase();
            const color = document.getElementById('p-color').value.toUpperCase();
            const sellPrice = Number(document.getElementById('p-venta').value);
            const sizes = {};
            document.querySelectorAll('#p-sizes div').forEach(row => {
                const n = row.querySelector('.sz-n').value.toUpperCase();
                const q = parseInt(row.querySelector('.sz-q').value);
                if(n) sizes[n] = q || 0;
            });

            try {
                const data = { name, color, sellPrice, sizes };
                if(editingId) {
                    await db.collection("inventory").doc(editingId).update(data);
                } else {
                    await db.collection("inventory").add(data);
                }
                closeModal('modal-p');
            } catch(e) {
                alert("Error al guardar: " + e.message);
                log(e.message);
            } finally {
                btn.disabled = false; btn.innerText = "GUARDAR";
            }
        }

        async function deleteProduct() {
            if(!confirm("¿Borrar definitivamente?")) return;
            await db.collection("inventory").doc(editingId).delete();
            closeModal('modal-p');
        }

        function renderInventory() {
            const cont = document.getElementById('inventory-list');
            cont.innerHTML = inventory.map(p => `
                <div class="card" onclick="openProductModal('${p.id}')">
                    <b>${p.name}</b> <span style="float:right">$${(p.sellPrice||0).toLocaleString()}</span><br>
                    <small>${p.color}</small><br>
                    <div style="margin-top:5px">
                        ${Object.entries(p.sizes||{}).map(([s,q]) => `<span style="font-size:10px; background:#333; padding:2px 5px; margin-right:3px;">${s}:${q}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- LÓGICA DE SALIDAS ---
        function openSalidaModal() {
            const sProd = document.getElementById('s-prod');
            sProd.innerHTML = '<option value="">Seleccionar...</option>' + 
                inventory.map(p => `<option value="${p.id}">${p.name} (${p.color})</option>`).join('');
            openModal('modal-s');
        }

        function updateSalidaSizes() {
            const p = inventory.find(x => x.id === document.getElementById('s-prod').value);
            document.getElementById('s-size').innerHTML = p ? 
                Object.keys(p.sizes).map(s => `<option value="${s}">${s}</option>`).join('') : '';
        }

        async function processSalida() {
            const btn = document.getElementById('s-save-btn');
            btn.disabled = true; btn.innerText = "ENTREGANDO...";
            
            const pId = document.getElementById('s-prod').value;
            const p = inventory.find(x => x.id === pId);
            const sz = document.getElementById('s-size').value;

            try {
                await db.collection("permitidos").add({
                    mall: "CENTRO", // Temporal o añade select de malls
                    local: document.getElementById('s-local').value.toUpperCase(),
                    name: p.name, size: sz, qty: 1, timestamp: Date.now()
                });
                const newSizes = {...p.sizes}; newSizes[sz] -= 1;
                await db.collection("inventory").doc(pId).update({ sizes: newSizes });
                closeModal('modal-s');
            } catch(e) {
                alert(e.message);
            } finally {
                btn.disabled = false; btn.innerText = "ENTREGAR";
            }
        }

        function renderLocales() {
            const cont = document.getElementById('tab-locales');
            cont.innerHTML = permitidos.map(p => `
                <div class="card">
                    <b>${p.local}</b> - ${p.name} (${p.size})<br>
                    <button class="btn-main" style="background:var(--success); padding:8px; margin-top:10px;" onclick="finalizar('${p.id}')">VENDIDO / QUITAR</button>
                </div>
            `).join('');
        }

        async function finalizar(id) {
            if(confirm("¿Quitar de la lista?")) await db.collection("permitidos").doc(id).delete();
        }
    </script>
</body>
</html>
