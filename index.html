<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monka Pro v2</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --gold: #d4af37; --text: #ffffff; --gray: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-top: 60px; padding-bottom: 80px; }
        
        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; height: 60px; background: var(--bg); border-bottom: 1px solid var(--gold); display: flex; z-index: 100; align-items: center; }
        .tab { flex: 1; text-align: center; color: var(--gray); padding: 15px 0; font-weight: bold; cursor: pointer; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        .settings-btn { padding: 15px; color: var(--gold); font-size: 20px; background: none; border: none; }

        /* Vistas */
        .view { display: none; padding: 15px; }
        .view.active { display: block; }

        /* Botones y Cards */
        .card { background: var(--surface); border: 1px solid var(--gold); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--gold); color: #000; font-size: 30px; border: none; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Inputs */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); border: 1px solid var(--gold); padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; }
        
        .tag { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 4px; display: inline-block; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="tab active" onclick="switchTab('locales')">LOCALES</div>
        <div class="tab" onclick="switchTab('bodega')">BODEGA</div>
        <div class="tab" onclick="switchTab('reportes')">REPORTES</div>
        <button class="settings-btn" onclick="openModal('modalSettings')">⚙️</button>
    </nav>

    <main id="locales" class="view active">
        <select id="filterMall" onchange="renderLocales()"><option value="ALL">Todo Junto</option></select>
        <div id="localesList"></div>
        <button class="fab" onclick="openModal('modalDispatch')">+</button>
    </main>

    <main id="bodega" class="view">
        <input type="text" id="searchBodega" placeholder="Buscar..." onkeyup="renderBodega()">
        <div id="bodegaList"></div>
        <button class="fab" onclick="openModal('modalBodega')">+</button>
    </main>

    <main id="reportes" class="view">
        <div class="card">
            <h2 id="valVentas">Ventas: $0</h2>
            <h2 id="valGanancia" style="color: #4cd137;">Neta: $0</h2>
        </div>
        <button class="btn" style="background: #25D366;" onclick="enviarWhatsApp()">WhatsApp Reporte</button>
    </main>

    <div id="modalSettings" class="modal">
        <div class="modal-content">
            <h3>Locales</h3>
            <input type="text" id="newMallName" placeholder="Nombre local">
            <button class="btn" onclick="addMall()">Añadir</button>
            <div id="mallsList" style="margin-top:15px;"></div>
            <button class="btn" onclick="closeModal('modalSettings')" style="background:#444; color:#fff;">Cerrar</button>
        </div>
    </div>

    <div id="modalBodega" class="modal">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <input type="text" id="pName" placeholder="Nombre">
            <input type="text" id="pRef" placeholder="REF">
            <input type="number" id="pCompra" placeholder="Costo">
            <input type="number" id="pVenta" placeholder="Venta">
            <input type="text" id="pTalla" placeholder="Tallas (ej: 38,40,42)">
            <button class="btn" onclick="saveProduct()">Guardar</button>
            <button class="btn" onclick="closeModal('modalBodega')" style="background:#444; color:#fff;">Cancelar</button>
        </div>
    </div>

    <div id="modalDispatch" class="modal">
        <div class="modal-content">
            <h3>Enviar a Local</h3>
            <select id="dProd"></select>
            <input type="text" id="dTalla" placeholder="Talla a enviar">
            <select id="dMall"></select>
            <button class="btn" onclick="dispatch()">Enviar</button>
            <button class="btn" onclick="closeModal('modalDispatch')" style="background:#444; color:#fff;">Cerrar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
            authDomain: "permitidos-step.firebaseapp.com",
            projectId: "permitidos-step",
            storageBucket: "permitidos-step.firebasestorage.app",
            messagingSenderId: "790890287189",
            appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        // INICIALIZACIÓN
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let DATA_PRODS = [];
        let DATA_MALLS = [];
        let DATA_DISP = [];

        // NAVEGACIÓN
        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            // Buscar la pestaña por texto si no viene el elemento
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => { if(t.innerText.toLowerCase() === id.toLowerCase()) t.classList.add('active'); });
            
            document.getElementById(id).classList.add('active');
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // --- LÓGICA DE BASE DE DATOS ---

        // Escuchar Locales
        db.collection("malls").onSnapshot(snap => {
            DATA_MALLS = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            let html = "";
            let opts = '<option value="ALL">Todo Junto</option>';
            let dOpts = "";
            DATA_MALLS.forEach(m => {
                html += `<p>${m.name} <span onclick="deleteMall('${m.id}')" style="color:red"> [X]</span></p>`;
                opts += `<option value="${m.name}">${m.name}</option>`;
                dOpts += `<option value="${m.name}">${m.name}</option>`;
            });
            document.getElementById('mallsList').innerHTML = html;
            document.getElementById('filterMall').innerHTML = opts;
            document.getElementById('dMall').innerHTML = dOpts;
        });

        async function addMall() {
            const name = document.getElementById('newMallName').value;
            if(name) await db.collection("malls").add({name});
            document.getElementById('newMallName').value = "";
        }

        async function deleteMall(id) { if(confirm('Eliminar?')) await db.collection("malls").doc(id).delete(); }

        // Escuchar Bodega
        db.collection("products").onSnapshot(snap => {
            DATA_PRODS = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderBodega();
            let opts = "";
            DATA_PRODS.forEach(p => opts += `<option value="${p.id}">${p.name} - ${p.ref}</option>`);
            document.getElementById('dProd').innerHTML = opts;
        });

        async function saveProduct() {
            const p = {
                name: document.getElementById('pName').value,
                ref: document.getElementById('pRef').value,
                compra: Number(document.getElementById('pCompra').value),
                venta: Number(document.getElementById('pVenta').value),
                tallas: document.getElementById('pTalla').value.split(',')
            };
            await db.collection("products").add(p);
            closeModal('modalBodega');
        }

        function renderBodega() {
            let html = "";
            DATA_PRODS.forEach(p => {
                html += `<div class="card">
                    <b>${p.name}</b> (REF: ${p.ref})<br>
                    Costo: $${p.compra} | Venta: $${p.venta}<br>
                    Tallas: ${p.tallas.map(t => `<span class="tag">${t}</span>`).join('')}
                </div>`;
            });
            document.getElementById('bodegaList').innerHTML = html;
        }

        // Despachos y Ventas
        db.collection("dispatches").onSnapshot(snap => {
            DATA_DISP = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderLocales();
            renderReporte();
        });

        async function dispatch() {
            const pId = document.getElementById('dProd').value;
            const p = DATA_PRODS.find(x => x.id === pId);
            const d = {
                name: p.name, ref: p.ref, compra: p.compra, venta: p.venta,
                talla: document.getElementById('dTalla').value,
                mall: document.getElementById('dMall').value,
                status: 'active',
                fecha: new Date().toLocaleDateString()
            };
            await db.collection("dispatches").add(d);
            closeModal('modalDispatch');
        }

        function renderLocales() {
            const filter = document.getElementById('filterMall').value;
            let html = "";
            DATA_DISP.filter(x => x.status === 'active').forEach(d => {
                if(filter === 'ALL' || d.mall === filter) {
                    html += `<div class="card">
                        <b>${d.name}</b> [${d.mall}]<br>
                        Talla: ${d.talla} | REF: ${d.ref}<br>
                        <button class="btn" onclick="vender('${d.id}')">VENDIDO $</button>
                    </div>`;
                }
            });
            document.getElementById('localesList').innerHTML = html;
        }

        async function vender(id) {
            await db.collection("dispatches").doc(id).update({status: 'sold', fechaVenta: new Date().toLocaleDateString()});
        }

        function renderReporte() {
            const hoy = new Date().toLocaleDateString();
            const ventas = DATA_DISP.filter(x => x.status === 'sold' && x.fechaVenta === hoy);
            const total = ventas.reduce((a, b) => a + b.venta, 0);
            const costo = ventas.reduce((a, b) => a + b.compra, 0);
            document.getElementById('valVentas').innerText = `Ventas Hoy: $${total}`;
            document.getElementById('valGanancia').innerText = `Ganancia: $${total - costo}`;
        }

        function enviarWhatsApp() {
            const msg = document.getElementById('valVentas').innerText + " | " + document.getElementById('valGanancia').innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
