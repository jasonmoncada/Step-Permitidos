<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Permitidos Monka - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #d4af37; --bg: #0f0f0f; --surface: #1e1e1e; --success: #2e7d32; --error: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        .header { background: var(--surface); padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; flex: 1; }
        .nav { display: flex; background: var(--surface); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; font-size: 0.75rem; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .search-container { padding: 10px; background: #151515; }
        .card { background: var(--surface); padding: 15px; margin: 10px; border-radius: 8px; border-left: 4px solid var(--primary); position: relative; }
        .size-tag { background: #333; padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; margin-right: 5px; border: 1px solid #444; display: inline-block; margin-top: 5px; }
        .btn-main { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; background: var(--primary); color: black; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid black; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 30px; background: var(--primary); border: none; font-size: 28px; color: black; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 99; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; color:#d4af37;">
            Cargando sistema...
        </div>
    </div>

    <script type="text/babel">
        // Configuración de Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyD0ndSzE5JvgsvVdcUJa9S9yR3X_VvY8-Y",
          authDomain: "permitidos-step.firebaseapp.com",
          projectId: "permitidos-step",
          storageBucket: "permitidos-step.firebasestorage.app",
          messagingSenderId: "790890287189",
          appId: "1:790890287189:web:f4dcac6e46765790a98075"
        };

        // Inicialización segura
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        } catch (e) {
            console.error("Error inicializando Firebase:", e);
        }

        const db = firebase.firestore();
        const { useState, useEffect } = React;

        function App() {
            const [tab, setTab] = useState('locales');
            const [inventory, setInventory] = useState([]);
            const [malls, setMalls] = useState([]);
            const [permitidos, setPermitidos] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [loading, setLoading] = useState(false);
            
            const [showInvForm, setShowInvForm] = useState(false);
            const [showMallMgmt, setShowMallMgmt] = useState(false);
            const [showAddPermitido, setShowAddPermitido] = useState(false);
            const [editProduct, setEditProduct] = useState(null);
            const [sizesInput, setSizesInput] = useState([{ size: '', qty: '' }]);

            useEffect(() => {
                // Escuchas en tiempo real
                const unsubInv = db.collection("inventory").onSnapshot(s => setInventory(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubMalls = db.collection("malls").onSnapshot(s => setMalls(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubPerm = db.collection("permitidos").onSnapshot(s => setPermitidos(s.docs.map(d => ({id: d.id, ...d.data()}))));
                
                return () => { unsubInv(); unsubMalls(); unsubPerm(); };
            }, []);

            const handleSaveProduct = async (e) => {
                e.preventDefault();
                setLoading(true);
                const f = e.target;
                const sMap = {};
                sizesInput.forEach(s => { if(s.size) sMap[s.size.toUpperCase()] = parseInt(s.qty) || 0; });
                
                try {
                    await db.collection("inventory").add({
                        name: f.n.value.toUpperCase(), color: f.c.value.toUpperCase(),
                        buyPrice: parseFloat(f.bp.value), sellPrice: parseFloat(f.sp.value), sizes: sMap
                    });
                    setShowInvForm(false);
                    setSizesInput([{size:'', qty:''}]);
                } catch (err) { alert("Error al guardar"); }
                setLoading(false);
            };

            const handleUpdateStock = async (e) => {
                e.preventDefault();
                setLoading(true);
                const sMap = {};
                sizesInput.forEach(s => { if(s.size) sMap[s.size.toUpperCase()] = parseInt(s.qty) || 0; });
                
                try {
                    await db.collection("inventory").doc(editProduct.id).update({ sizes: sMap });
                    setEditProduct(null);
                } catch (err) { alert("Error al actualizar"); }
                setLoading(false);
            };

            const handleDeliver = async (e) => {
                e.preventDefault();
                setLoading(true);
                const f = e.target;
                const p = inventory.find(i => i.id === f.pId.value);
                const q = parseInt(f.q.value);
                const sz = f.sz.value;

                try {
                    await db.collection("permitidos").add({
                        mall: f.m.value, local: f.l.value.toUpperCase(), name: p.name, color: p.color, size: sz,
                        qty: q, sellPrice: p.sellPrice, buyPrice: p.buyPrice, date: new Date().toLocaleDateString()
                    });
                    const newS = {...p.sizes}; 
                    newS[sz] -= q;
                    await db.collection("inventory").doc(p.id).update({ sizes: newS });
                    setShowAddPermitido(false);
                } catch (err) { alert("Error en la entrega"); }
                setLoading(false);
            };

            const filteredInventory = inventory.filter(p => 
                (p.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
                (p.color || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div>
                    <div className="header">
                        <div style={{width: 40}}></div>
                        <h1>PERMITIDOS MONKA ☁️</h1>
                        <button onClick={() => setShowMallMgmt(true)} style={{background:'none', border:'none', fontSize:'1.5rem', color:'var(--primary)'}}>⚙️</button>
                    </div>

                    <div className="nav">
                        <button className={`nav-btn ${tab === 'locales' ? 'active' : ''}`} onClick={() => setTab('locales')}>LOCALES</button>
                        <button className={`nav-btn ${tab === 'bodega' ? 'active' : ''}`} onClick={() => setTab('bodega')}>BODEGA</button>
                    </div>

                    {tab === 'bodega' && (
                        <div>
                            <div className="search-container">
                                <input 
                                    placeholder="🔍 Buscar producto o color..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    style={{marginTop:0}}
                                />
                            </div>
                            <div style={{padding: 10}}>
                                <button className="btn-main" onClick={() => setShowInvForm(true)}>+ NUEVO PRODUCTO</button>
                                {filteredInventory.map(p => (
                                    <div key={p.id} className="card" onClick={() => {
                                        setEditProduct(p);
                                        setSizesInput(Object.entries(p.sizes || {}).map(([size, qty]) => ({ size, qty })));
                                    }}>
                                        <b>{p.name}</b> <span style={{float:'right', color:'var(--primary)'}}>${(p.sellPrice || 0).toLocaleString()}</span><br/>
                                        <small>{p.color}</small>
                                        <div style={{marginTop:10}}>
                                            {Object.entries(p.sizes || {}).map(([sz, q]) => (
                                                <span key={sz} className="size-tag">{sz}: {q}</span>
                                            ))}
                                        </div>
                                        <p style={{fontSize:'0.65rem', color:'var(--primary)', marginTop:10, textAlign:'right'}}>✎ Toca para editar stock</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'locales' && (
                        <div style={{padding:10}}>
                            {malls.length === 0 && <p style={{textAlign:'center', color:'#666', marginTop:20}}>Agrega Centros Comerciales en el icono ⚙️</p>}
                            {malls.map(m => {
                                const items = permitidos.filter(p => p.mall === m.name);
                                if(items.length === 0) return null;
                                return (
                                    <div key={m.id} className="card">
                                        <b style={{color:'var(--primary)'}}>📍 {m.name}</b>
                                        {items.map(p => (
                                            <div key={p.id} style={{marginTop:15, borderTop:'1px solid #333', paddingTop:10}}>
                                                <b>{p.local}</b> - {p.name} ({p.size})<br/>
                                                <small>{p.color} | ${(p.sellPrice || 0).toLocaleString()}</small>
                                                <div style={{display:'flex', gap:10, marginTop:10}}>
                                                    <button className="btn-main" style={{background:'var(--success)', color:'white', marginTop:0, padding:10}} onClick={() => db.collection("permitidos").doc(p.id).delete()}>VENDIDO</button>
                                                    <button className="btn-main" style={{background:'#444', color:'white', marginTop:0, padding:10}} onClick={() => db.collection("permitidos").doc(p.id).delete()}>DEVOLVER</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    <button className="fab" onClick={() => setShowAddPermitido(true)}>+</button>

                    {/* MODAL EDITAR STOCK */}
                    {editProduct && (
                        <div className="modal">
                            <h2>Stock: {editProduct.name}</h2>
                            <form onSubmit={handleUpdateStock}>
                                {sizesInput.map((s, i) => (
                                    <div key={i} style={{display:'flex', gap:5, marginTop:5}}>
                                        <input placeholder="Talla" value={s.size} onChange={e => { const n = [...sizesInput]; n[i].size = e.target.value.toUpperCase(); setSizesInput(n); }} />
                                        <input type="number" placeholder="Cant" value={s.qty} onChange={e => { const n = [...sizesInput]; n[i].qty = e.target.value; setSizesInput(n); }} />
                                        <button type="button" onClick={() => setSizesInput(sizesInput.filter((_, idx) => idx !== i))} style={{background:'none', border:'none', color: 'var(--error)', fontSize:'1.2rem'}}>✕</button>
                                    </div>
                                ))}
                                <button type="button" onClick={() => setSizesInput([...sizesInput, {size:'', qty:''}])} className="btn-main" style={{background:'none', border:'1px dashed var(--primary)', color:'var(--primary)'}}>+ Añadir Talla</button>
                                <button type="submit" className="btn-main" disabled={loading}>
                                    {loading ? <div className="spinner"></div> : 'GUARDAR CAMBIOS'}
                                </button>
                                <button type="button" className="btn-main" style={{background:'#444'}} onClick={() => setEditProduct(null)}>CANCELAR</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL NUEVO PRODUCTO */}
                    {showInvForm && (
                        <div className="modal">
                            <h2>Nuevo Producto</h2>
                            <form onSubmit={handleSaveProduct}>
                                <input name="n" placeholder="Nombre" required />
                                <input name="c" placeholder="Color" required />
                                <input name="bp" type="number" placeholder="Precio Costo" required />
                                <input name="sp" type="number" placeholder="Precio Venta" required />
                                {sizesInput.map((s, i) => (
                                    <div key={i} style={{display:'flex', gap:5, marginTop:5}}>
                                        <input placeholder="Talla" value={s.size} onChange={e => { const n = [...sizesInput]; n[i].size = e.target.value.toUpperCase(); setSizesInput(n); }} />
                                        <input type="number" placeholder="Cant" value={s.qty} onChange={e => { const n = [...sizesInput]; n[i].qty = e.target.value; setSizesInput(n); }} />
                                    </div>
                                ))}
                                <button type="button" onClick={() => setSizesInput([...sizesInput, {size:'', qty:''}])} className="btn-main" style={{background:'none', border:'1px dashed var(--primary)', color:'var(--primary)'}}>+ Otra Talla</button>
                                <button type="submit" className="btn-main" disabled={loading}>
                                    {loading ? <div className="spinner"></div> : 'CREAR'}
                                </button>
                                <button type="button" className="btn-main" style={{background:'#444'}} onClick={() => setShowInvForm(false)}>CANCELAR</button>
                            </form>
                        </div>
                    )}

                    {/* MODAL ENTREGA */}
                    {showAddPermitido && (
                        <div className="modal">
                            <h2>Registrar Salida</h2>
                            <form onSubmit={handleDeliver}>
                                <label>CC:</label>
                                <select name="m" required>
                                    {malls.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                                </select>
                                <label>Local:</label><input name="l" required placeholder="Ej: Local 204" />
                                <label>Producto:</label>
                                <select name="pId" required onChange={(e) => {
                                    const p = inventory.find(i => i.id === e.target.value);
                                    window.tempSz = p ? Object.keys(p.sizes || {}) : [];
                                    setTab('locales'); setTab('locales'); 
                                }}>
                                    <option value="">Seleccione...</option>
                                    {inventory.map(i => <option key={i.id} value={i.id}>{i.name} ({i.color})</option>)}
                                </select>
                                <label>Talla:</label>
                                <select name="sz">{(window.tempSz || []).map(s => <option key={s} value={s}>{s}</option>)}</select>
                                <label>Cantidad:</label><input name="q" type="number" defaultValue="1" required />
                                <button type="submit" className="btn-main" disabled={loading}>
                                    {loading ? <div className="spinner"></div> : 'ENTREGAR'}
                                </button>
                                <button type="button" className="btn-main" style={{background:'#444'}} onClick={() => setShowAddPermitido(false)}>CANCELAR</button>
                            </form>
                        </div>
                    )}

                    {/* CONFIG CC */}
                    {showMallMgmt && (
                        <div className="modal">
                            <h2>Configuración CC</h2>
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                setLoading(true);
                                try {
                                    await db.collection("malls").add({ name: e.target.m.value.toUpperCase() });
                                    e.target.reset();
                                } catch(err) { alert("Error"); }
                                setLoading(false);
                            }}>
                                <input name="m" placeholder="Nombre CC" required />
                                <button type="submit" className="btn-main" disabled={loading}>
                                    {loading ? <div className="spinner"></div> : 'AGREGAR'}
                                </button>
                            </form>
                            <div style={{marginTop:20}}>
                                {malls.map(m => (
                                    <div key={m.id} style={{padding:15, background:'#222', marginBottom:5, borderRadius:8, display:'flex', justifyContent:'space-between'}}>
